# Project information
site_name: AI Drone – Automated Delivery
site_description: Documentation for the project "Automated drone delivery with AI"
site_author: Team Drone[X]
site_url: https://ki-drohnen-ss26.github.io/project-docs/

# Repository (for "Edit on GitHub" button)
repo_name: ki-drohnen-ss26/project-docs
repo_url: https://github.com/ki-drohnen-ss26/project-docs
edit_uri: edit/main/docs/

not_in_nav: |
  history/_template.md

# Copyright
copyright: Copyright &copy; 2026 Team Drone

# Theme configuration
theme:
  name: material
  language: en
  logo: assets/images/logo.png       # optional
  favicon: assets/images/favicon.png # optional

  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  font:
    text: Roboto
    code: Roboto Mono

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.tooltips

  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

# Plugins
plugins:
  - search:
      lang:
        - en
  - glightbox
  - tags

# Markdown extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true

  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Navigation
nav:
  - Home: index.md
  - Hardware:
      - hardware/index.md
      - Drone (Frame & FC): hardware/drone.md
      - Raspberry Pi Zero 2: hardware/raspberry-pi.md
      - AI Camera Module: hardware/ai-camera.md
      - MTF-01P Sensor: hardware/mtf-01p.md
      - RC & FPV: hardware/rc-fpv.md
  - Software:
      - software/index.md
      - Flight Controller Firmware: software/flight-controller.md
      - Raspberry Pi OS: software/raspberry-pi-os.md
      - Ground Control Station: software/gcs.md
      - AI Software: software/ai-software.md
  - Autopilot:
      - autopilot/index.md
      - ArduPilot Setup: autopilot/ardupilot-setup.md
      - Position & Altitude Hold: autopilot/position-altitude-hold.md
      - Mission Planning: autopilot/mission-planning.md
  - Sensors:
      - sensors/index.md
      - MTF-01P Configuration: sensors/mtf-01p-configuration.md
      - Optical Flow: sensors/optical-flow.md
      - LiDAR: sensors/lidar.md
  - Delivery System:
      - delivery-system/index.md
      - Research & Concepts: delivery-system/research.md
      - Servo Mechanism: delivery-system/servo-mechanism.md
      - 3D Printing: delivery-system/3d-printing.md
  - Frame Extension:
      - frame/index.md
      - CAD Models: frame/cad-models.md
      - Print Guide: frame/print-guide.md
  - Tutorials:
      - tutorials/index.md
      - Quick Start: tutorials/quickstart.md
      - Build Guide: tutorials/build-guide.md
  - Project Journal:
      - history/index.md
      - Week 1: history/week-01.md
      - Week 2: history/week-02.md
  - Results:
      - results/index.md
      - Live Demo: results/demo.md
      - Limitations: results/limitations.md

# Extras
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ki-drohnen-ss26/project-docs
  generator: false

extra_css:
  - assets/stylesheets/extra.css
